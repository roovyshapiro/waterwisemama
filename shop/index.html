<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Water Wise Mama</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Reusing your root variables for consistency */
        :root {
            --color-primary: #8B4513; 
            --color-secondary: #B8860B; 
            --color-background: #FAF8F5; 
            --color-water: #9CB2B0; 
            --font-logo: 'Great Vibes', cursive;
            --font-main: 'Cormorant Garamond', serif;
        }

        body { font-family: var(--font-main); color: var(--color-primary); background-color: var(--color-background); line-height: 1.6; }
        .container { width: 90%; max-width: 1100px; margin: 0 auto; padding: 40px 0; }
        h1 { font-family: var(--font-logo); font-size: 4em; text-align: center; }
        h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--color-water); display: inline-block; margin: 40px 0 20px; }
        h3 { text-transform: uppercase; letter-spacing: 2px; display: inline-block; margin: 40px 0 20px; }


        /* --- Header & Logo Section --- */
        header { text-align: center; padding: 40px 0 20px; }
        .header-logo-text { font-family: var(--font-logo); font-size: 4em; margin-top: 10px; }

        .logo-img {
            max-width: 250px;
            height: auto;
            border-radius: 50%;
            border: 5px solid var(--color-water);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }
        .logo-img:hover { transform: scale(1.02); }
        .header-line-image { width: 50%; height: auto; padding-top: 40px; }
        .header-logo-text { font-family: var(--font-logo); font-size: 4em; margin-top: 10px; }


        /* Shop Grid */
        .shop-category-section { margin-bottom: 60px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .product-name { font-size: 1.5em; font-weight: 600; margin-bottom: 10px; }
        .product-desc { font-size: 1em; flex-grow: 1; margin-bottom: 20px; color: #555; }

        .buy-button {
            background-color: var(--color-water);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .buy-button:hover { background-color: var(--color-secondary); }

        header { text-align: center; padding: 40px 0; background: white; border-bottom: 1px solid #eee; }
        .top-nav {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-primary);
            font-weight: 600;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }

        .nav-link:hover {
            color: var(--color-secondary);
        }

        .nav-link.active {
            border-bottom: 2px solid var(--color-water);
        }

        @media (max-width: 768px) {
        #about { flex-direction: column; text-align: center; }
        .shevy-image-container { order: -1; }
        .header-line-image { width: 80%; padding-top: 20px; }
        .header-logo-text { font-size: 2.2em; }
        .testimonial-text { font-size: 1.1em; }
    }
    </style>
</head>
<body>

   <header>
      <div class="container">
        <a href="/">
            <img src="../images/logo.png" alt="Water Wise Mama Logo" class="logo-img">
        </a>
         <p class="header-logo-text">Water Wise Mama</p>
         <p class="header-logo-text"><b>Shop</b></p>
         <h3>My hand-picked favorites for a safe and joyful water experience.</h3>
         <p><i>As an Amazon Associate I earn from qualifying purchases.</i></p>
      </div>
        <nav class="top-nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/shop/" class="nav-link active">Shop</a>
        </nav>
   </header>

<div class="container" id="shop-container">
    </div>

<script>
    // Fetch and display products
    async function loadProducts() {
        try {
            const response = await fetch('affiliate_products.json');
            const products = await response.json();
            
            // Group products by category
            const categories = [...new Set(products.map(p => p.category))];
            const container = document.getElementById('shop-container');

            categories.forEach(cat => {
                const section = document.createElement('section');
                section.className = 'shop-category-section';
                
                section.innerHTML = `<h2>${cat}</h2><div class="product-grid" id="grid-${cat.replace(/\s+/g, '')}"></div>`;
                container.appendChild(section);

                const grid = document.getElementById(`grid-${cat.replace(/\s+/g, '')}`);
                const catProducts = products.filter(p => p.category === cat);

                catProducts.forEach(product => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image}" alt="${product.name}" class="product-image">
                            <div class="product-name">${product.name}</div>
                            <p class="product-desc">${product.description}</p>
                            <a href="${product.link}" target="_blank" class="buy-button">View on Amazon</a>
                        </div>
                    `;
                });
            });
        } catch (error) {
            console.error("Error loading the shop products:", error);
        }
    }

    loadProducts();
</script>

</body>
</html>
